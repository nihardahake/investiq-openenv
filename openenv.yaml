name: investiq-portfolio-env
version: "1.0.0"
description: >
  Real-world Indian stock market portfolio management environment.
  An AI agent learns to allocate capital across equity, debt, and gold
  based on a user's risk profile, evaluated against 10yr NSE market data.

tasks:
  - id: task1_allocation
    name: Portfolio Allocation
    difficulty: easy
    max_steps: 1
    description: >
      Given a user's risk profile, choose the correct
      equity/debt/gold percentage split.

  - id: task2_stock_selection
    name: Stock Selection
    difficulty: medium
    max_steps: 2
    description: >
      Given an allocation, pick the highest quality NSE stocks
      based on Sharpe ratio and sector diversification.

  - id: task3_full_portfolio
    name: Full Portfolio Optimization
    difficulty: hard
    max_steps: 3
    description: >
      Complete portfolio construction including allocation,
      stock selection, and rebalancing over 3 steps.

observation_space:
  risk_score: int
  investment_amount: float
  income: str
  risk_appetite: str
  time_horizon: str
  goal: str
  available_stocks: list
  market_data: list
  current_portfolio: dict
  score_so_far: float

action_space:
  equity_pct: float
  debt_pct: float
  gold_pct: float
  selected_stocks: list

reward_range: [0.0, 1.0]

api:
  base_url: /
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks